<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CRUD de Contas Bancárias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-4">Contas Bancárias</h1>

    <!-- Formulário de criação -->
    <form id="form-criar" class="row g-3 mb-4">
        <div class="col-md-5">
            <input type="text" class="form-control" id="nome" placeholder="Nome do Titular" required>
        </div>
        <div class="col-md-3">
            <input type="number" class="form-control" id="saldo" placeholder="Saldo Inicial" min="0" step="0.01" required>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Criar Conta</button>
        </div>
    </form>

    <!-- Tabela de contas -->
    <table class="table table-striped" id="tabela-contas">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Saldo</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <!-- Preenchimento irá ocorre via scripts -->
        </tbody>
    </table>
</div>

<!-- Modal de edição -->
<div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
  <div class="modal-dialog">
    <form class="modal-content" id="form-editar">
      <div class="modal-header">
        <h5 class="modal-title" id="modalEditarLabel">Editar Conta</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editar-id">
        <div class="mb-3">
          <label for="editar-nome" class="form-label">Nome</label>
          <input type="text" class="form-control" id="editar-nome" required>
        </div>
        <div class="mb-3">
          <label for="editar-saldo" class="form-label">Saldo</label>
          <input type="number" class="form-control" id="editar-saldo" min="0" step="0.01" required>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-success" id="btn-salvar-edicao">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal de exclusão -->
<div class="modal fade" id="modalExcluir" tabindex="-1" aria-labelledby="modalExcluirLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalExcluirLabel">Excluir Conta</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        Tem certeza que deseja excluir esta conta?
        <input type="hidden" id="excluir-id">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" id="btn-confirmar-excluir">Excluir</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS e Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="scripts/main.js"></script>
</body>
</html>
